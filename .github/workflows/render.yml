name: Render videos

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "public/**"
      - "package.json"
      - "remotion.config.ts"
  workflow_dispatch:
    inputs:
      composition:
        description: "Composition ID to render (leave blank for all)"
        required: false
        default: ""

jobs:
  render:
    name: Render ${{ matrix.composition }}
    runs-on: ubuntu-latest

    strategy:
      matrix:
        composition:
          - homelab-automation

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Chrome headless shell (~170 MB) — cache by node_modules hash
      - name: Cache Chrome headless shell
        uses: actions/cache@v4
        with:
          path: ~/.cache/puppeteer
          key: chrome-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: chrome-${{ runner.os }}-

      # Webpack module cache — speeds up re-bundling when only assets change
      - name: Cache webpack bundle
        uses: actions/cache@v4
        with:
          path: node_modules/.cache
          key: webpack-${{ runner.os }}-${{ hashFiles('src/**', 'remotion.config.ts', 'package-lock.json') }}
          restore-keys: webpack-${{ runner.os }}-

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            libgbm-dev \
            libnss3 \
            libatk1.0-0 \
            libatk-bridge2.0-0 \
            libcups2 \
            libxkbcommon0 \
            libxcomposite1 \
            libxdamage1 \
            libxrandr2 \
            libpango-1.0-0 \
            libcairo2 \
            libasound2t64

      - name: Render ${{ matrix.composition }}
        run: |
          npx remotion render ${{ matrix.composition }} \
            out/${{ matrix.composition }}.mp4 \
            --codec=h264 \
            --crf=1 \
            --jpeg-quality=100

      - name: Upload rendered video
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.composition }}
          path: out/${{ matrix.composition }}.mp4
          retention-days: 30
